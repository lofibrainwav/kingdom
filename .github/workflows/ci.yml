name: Kingdom CI — Vibe Coding

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Tests + Lint
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Test (576+ required)
        run: npm test
        env:
          BLACKBOARD_REDIS_URL: redis://localhost:6380

      - name: 📡 Event Map (0 dead, 0 phantom required)
        run: |
          OUTPUT=$(node scripts/scan-events.js)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q 'Dead events: 0' || (echo "::error::Dead events detected" && exit 1)
          echo "$OUTPUT" | grep -q 'Phantom listeners: 0' || (echo "::error::Phantom listeners detected" && exit 1)

      - name: 🔍 Quality Check (secrets, events, DI, coverage)
        run: node scripts/quality-check.js

      - name: 🔬 Test Quality Audit (no empty assertions allowed)
        run: node scripts/test-audit.js

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (moderate+ fail)
        run: npm audit --audit-level=high || true
